<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>
        House Price Prediction
    </title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container py-5">

    <!-- HERO SECTION -->

    <div class="hero-section text-center mb-5">

        <h1>
            House Price Prediction
        </h1>

        <p>
            Predict property prices using Machine Learning
        </p>

    </div>

    <!-- MAIN CARD -->

    <div class="card custom-card shadow-lg">

        <div class="card-body p-4 p-md-5">

            <form action="/predict"
                  method="POST">

                <div class="row">

                    <!-- AREA -->

                    <div class="col-md-6 mb-3">

                        <label class="form-label">

                            Area (sq ft)

                        </label>

                        <input
                            type="number"
                            class="form-control"
                            name="area"
                            value="{{ area if area else '' }}"
                            required>

                    </div>

                    <!-- BEDROOMS -->

                    <div class="col-md-6 mb-3">

                        <label class="form-label">

                            Bedrooms

                        </label>

                        <input
                            type="number"
                            class="form-control"
                            name="bedrooms"
                            value="{{ bedrooms if bedrooms else '' }}"
                            required>

                    </div>

                    <!-- BATHROOMS -->

                    <div class="col-md-6 mb-3">

                        <label class="form-label">

                            Bathrooms

                        </label>

                        <input
                            type="number"
                            class="form-control"
                            name="bathrooms"
                            value="{{ bathrooms if bathrooms else '' }}"
                            required>

                    </div>

                    <!-- STORIES -->

                    <div class="col-md-6 mb-3">

                        <label class="form-label">

                            Stories

                        </label>

                        <input
                            type="number"
                            class="form-control"
                            name="stories"
                            value="{{ stories if stories else '' }}"
                            required>

                    </div>

                    <!-- PARKING -->

                    <div class="col-md-6 mb-3">

                        <label class="form-label">

                            Parking Spaces

                        </label>

                        <input
                            type="number"
                            class="form-control"
                            name="parking"
                            value="{{ parking if parking else '' }}"
                            required>

                    </div>

                    <!-- MAIN ROAD -->

                    <div class="col-md-6 mb-3">

                        <label class="form-label">

                            Main Road

                        </label>

                        <select
                            class="form-select"
                            name="mainroad">

                            <option value="yes"
                            {% if mainroad=="yes" %}
                            selected
                            {% endif %}
                            >
                                Yes
                            </option>

                            <option value="no"
                            {% if mainroad=="no" %}
                            selected
                            {% endif %}
                            >
                                No
                            </option>

                        </select>

                    </div>

                    <!-- GUESTROOM -->

                    <div class="col-md-6 mb-3">

                        <label class="form-label">

                            Guest Room

                        </label>

                        <select
                            class="form-select"
                            name="guestroom">

                            <option value="yes"
                            {% if guestroom=="yes" %}
                            selected
                            {% endif %}
                            >
                                Yes
                            </option>

                            <option value="no"
                            {% if guestroom=="no" %}
                            selected
                            {% endif %}
                            >
                                No
                            </option>

                        </select>

                    </div>

                    <!-- BASEMENT -->

                    <div class="col-md-6 mb-3">

                        <label class="form-label">

                            Basement

                        </label>

                        <select
                            class="form-select"
                            name="basement">

                            <option value="yes"
                            {% if basement=="yes" %}
                            selected
                            {% endif %}
                            >
                                Yes
                            </option>

                            <option value="no"
                            {% if basement=="no" %}
                            selected
                            {% endif %}
                            >
                                No
                            </option>

                        </select>

                    </div>

                    <!-- HOT WATER -->

                    <div class="col-md-6 mb-3">

                        <label class="form-label">

                            Hot Water Heating

                        </label>

                        <select
                            class="form-select"
                            name="hotwaterheating">

                            <option value="yes"
                            {% if hotwaterheating=="yes" %}
                            selected
                            {% endif %}
                            >
                                Yes
                            </option>

                            <option value="no"
                            {% if hotwaterheating=="no" %}
                            selected
                            {% endif %}
                            >
                                No
                            </option>

                        </select>

                    </div>

                    <!-- AIR CONDITIONING -->

                    <div class="col-md-6 mb-3">

                        <label class="form-label">

                            Air Conditioning

                        </label>

                        <select
                            class="form-select"
                            name="airconditioning">

                            <option value="yes"
                            {% if airconditioning=="yes" %}
                            selected
                            {% endif %}
                            >
                                Yes
                            </option>

                            <option value="no"
                            {% if airconditioning=="no" %}
                            selected
                            {% endif %}
                            >
                                No
                            </option>

                        </select>

                    </div>

                    <!-- PREF AREA -->

                    <div class="col-md-6 mb-3">

                        <label class="form-label">

                            Preferred Area

                        </label>

                        <select
                            class="form-select"
                            name="prefarea">

                            <option value="yes"
                            {% if prefarea=="yes" %}
                            selected
                            {% endif %}
                            >
                                Yes
                            </option>

                            <option value="no"
                            {% if prefarea=="no" %}
                            selected
                            {% endif %}
                            >
                                No
                            </option>

                        </select>

                    </div>

                    <!-- FURNISHING -->

                    <div class="col-md-12 mb-4">

                        <label class="form-label">

                            Furnishing Status

                        </label>

                        <select
                            class="form-select"
                            name="furnishingstatus">

                            <option value="furnished"
                            {% if furnishingstatus=="furnished" %}
                            selected
                            {% endif %}
                            >
                                Furnished
                            </option>

                            <option value="semi-furnished"
                            {% if furnishingstatus=="semi-furnished" %}
                            selected
                            {% endif %}
                            >
                                Semi-Furnished
                            </option>

                            <option value="unfurnished"
                            {% if furnishingstatus=="unfurnished" %}
                            selected
                            {% endif %}
                            >
                                Unfurnished
                            </option>

                        </select>

                    </div>

                </div>

                <button
                    type="submit"
                    class="btn btn-custom w-100">

                    Predict Price

                </button>

            </form>

            <!-- RESULT -->

            {% if prediction_text %}

            <div class="prediction-card">

                <h5>
                    Estimated House Price
                </h5>

                <h1>
                    {{ prediction_text }}
                </h1>

                <p>
                    Generated using the trained Machine Learning model
                </p>

            </div>

            {% endif %}

            <!-- ERROR -->

            {% if error %}

            <div class="alert alert-danger mt-4">

                {{ error }}

            </div>

            {% endif %}

        </div>

    </div>

</div>

</body>
</html>
