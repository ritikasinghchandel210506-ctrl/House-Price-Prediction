<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>House Price Predictor</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h2>House Price Prediction Panel</h2>
        <form action="/predict" method="POST">
            
            <div class="form-group">
                <label for="area">Total Area (sq ft):</label>
                <input type="number" id="area" name="area" required placeholder="e.g. 4000">
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="bedrooms">Bedrooms:</label>
                    <input type="number" id="bedrooms" name="bedrooms" min="1" max="10" required placeholder="3">
                </div>
                <div class="form-group">
                    <label for="bathrooms">Bathrooms:</label>
                    <input type="number" id="bathrooms" name="bathrooms" min="1" max="5" required placeholder="2">
                </div>
                <div class="form-group">
                    <label for="stories">Stories/Floors:</label>
                    <input type="number" id="stories" name="stories" min="1" max="5" required placeholder="2">
                </div>
            </div>

            <div class="form-group">
                <label for="parking">Parking Spaces:</label>
                <input type="number" id="parking" name="parking" min="0" max="4" required placeholder="1">
            </div>

            <div class="form-group">
                <label for="furnishingstatus">Furnishing Status:</label>
                <select id="furnishingstatus" name="furnishingstatus" required>
                    <option value="furnished">Furnished</option>
                    <option value="semi-furnished">Semi-Furnished</option>
                    <option value="unfurnished">Unfurnished</option>
                </select>
            </div>

            <h3 class="section-title">Amenities & Details</h3>
            <div class="grid-checkboxes">
                <div class="checkbox-item">
                    <input type="checkbox" id="mainroad" name="mainroad" value="1">
                    <input type="hidden" name="mainroad" value="0">
                    <label for="mainroad">Main Road Access</label>
                </div>
                <div class="checkbox-item">
                    <input type="checkbox" id="guestroom" name="guestroom" value="1">
                    <input type="hidden" name="guestroom" value="0">
                    <label for="guestroom">Guestroom Included</label>
                </div>
                <div class="checkbox-item">
                    <input type="checkbox" id="basement" name="basement" value="1">
                    <input type="hidden" name="basement" value="0">
                    <label for="basement">Basement</label>
                </div>
                <div class="checkbox-item">
                    <input type="checkbox" id="hotwaterheating" name="hotwaterheating" value="1">
                    <input type="hidden" name="hotwaterheating" value="0">
                    <label for="hotwaterheating">Water Heating</label>
                </div>
                <div class="checkbox-item">
                    <input type="checkbox" id="airconditioning" name="airconditioning" value="1">
                    <input type="hidden" name="airconditioning" value="0">
                    <label for="airconditioning">Air Conditioning</label>
                </div>
                <div class="checkbox-item">
                    <input type="checkbox" id="prefarea">
                    <input type="hidden" name="prefarea" value="0">
                    <label for="prefarea">Preferred Area</label>
                </div>
            </div>

            <button type="submit" class="btn">Calculate Price Estimate</button>
        </form>

        {% if prediction_text %}
            <div class="result-box">
                <h3>{{ prediction_text }}</h3>
            </div>
        {% endif %}
    </div>

    <script>
        // JavaScript workaround to handle unchecked checkboxes transmitting 0 cleanly to Flask
        document.querySelector('form').addEventListener('submit', function() {
            const checkboxes = this.querySelectorAll('input[type="checkbox"]');
            checkboxes.forEach(cb => {
                const hiddenInput = cb.nextElementSibling;
                if(cb.checked) {
                    hiddenInput.disabled = true;
                    cb.value = "1";
                } else {
                    hiddenInput.disabled = false;
                    hiddenInput.value = "0";
                }
            });
        });
    </script>
</body>
</html>
